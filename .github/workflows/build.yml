name: Build and Push OCI Image

on:
  push:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/star122013/fedora-niri-atomic

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:raw
            ${{ env.IMAGE_NAME }}:raw-${{ github.sha }}

