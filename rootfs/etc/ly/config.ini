allow_empty_password = false
clear_password = true
save = true
default_input = password

# Fedora's ly package ships these scripts without shebangs;
# run them explicitly through /bin/sh on atomic/bootc systems.
# >cmd: is replaced by ly with the desktop file Exec command
setup_cmd = /bin/sh /etc/ly/setup.sh >cmd:
start_cmd = /bin/sh /etc/ly/startup.sh

full_color = true
bg = 0x001E1E2E
fg = 0x00CDD6F4
border_fg = 0x00B4BEFE
error_fg = 0x01F38BA8
error_bg = 0x00181825

clock = %F %T
hide_version_string = true
hide_key_hints = false

shell = true
xsessions = /usr/share/xsessions
waylandsessions = /usr/share/wayland-sessions
