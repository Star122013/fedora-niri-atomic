experimental-features = nix-command flakes pipe-operators

# Prefer domestic binary caches during first-boot bootstrap on networks without a proxy.
# Order matters: Nix will try these mirrors first, then fall back to the official cache.
# Shanghai Jiao Tong University is the preferred primary cache here.
substituters = https://mirror.sjtu.edu.cn/nix-channels/store https://mirrors.tuna.tsinghua.edu.cn/nix-channels/store https://mirrors.ustc.edu.cn/nix-channels/store https://cache.nixos.org/

