# /var/nix
d /var/nix-system                 0755 root    root    -
d /var/nix                        0755 root    root    -
d /var/nix/var                    0755 root    root    -
d /var/nix/var/log                0755 root    root    -
d /var/nix/var/log/nix            0755 root    root    -
d /var/nix/var/log/nix/drvs       0755 root    root    -
d /var/nix/var/nix                0755 root    root    -
d /var/nix/var/nix/db             0755 root    root    -
d /var/nix/var/nix/gcroots        0755 root    root    -
d /var/nix/var/nix/gcroots/auto   0755 root    root    -
d /var/nix/var/nix/gcroots/per-user 0755 root root -
d /var/nix/var/nix/profiles       0755 root    root    -
d /var/nix/var/nix/profiles/per-user 0755 root root -
d /var/nix/var/nix/temproots      0755 root    root    -
d /var/nix/var/nix/userpool       0755 root    root    -
d /var/nix/var/nix/daemon-socket  0755 root    root    -
# pam
# Nixpkgs PAM on non-NixOS expects the NixOS wrapper path.
d /run/wrappers                 0755 root    root    -
d /run/wrappers/bin             0755 root    root    -
L /run/wrappers/bin/unix_chkpwd -    -       -       - /usr/sbin/unix_chkpwd
